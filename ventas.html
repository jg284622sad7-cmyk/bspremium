    <script>
        let bgScene, bgCamera, bgRenderer, bgParticles;
        function initBackground3D() {
            bgScene = new THREE.Scene(); bgCamera = new THREE.Camera(); bgCamera.position.z = 1;
            bgRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            bgRenderer.setSize(window.innerWidth, window.innerHeight); bgRenderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('threejs-canvas-container').appendChild(bgRenderer.domElement);
            const geometry = new THREE.BufferGeometry(); const vertices = []; const vertexColors = [];
            const goldColors = [new THREE.Color(0xd4af37), new THREE.Color(0xf3e5ab), new THREE.Color(0xffd700)];
            for (let i = 0; i < (window.innerWidth * window.innerHeight)/1000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2));
                const color = goldColors[Math.floor(Math.random() * goldColors.length)]; vertexColors.push(color.r, color.g, color.b);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3)); geometry.setAttribute('color', new THREE.Float32BufferAttribute(vertexColors, 3));
            const material = new THREE.PointsMaterial({ size: 0.005, vertexColors: true, blending: THREE.AdditiveBlending, depthTest: false, transparent: true, opacity: 0.8 });
            bgParticles = new THREE.Points(geometry, material); bgScene.add(bgParticles);
            window.addEventListener('resize', () => { bgCamera.aspect = window.innerWidth/window.innerHeight; bgRenderer.setSize(window.innerWidth, window.innerHeight); }, false);
        }
        function animateBackground3D() { requestAnimationFrame(animateBackground3D); bgParticles.rotation.y += 0.0005; bgParticles.rotation.x += 0.0001; bgRenderer.render(bgScene, bgCamera); }
        initBackground3D(); animateBackground3D();
    </script>

        // CONTROLES DE LA TARJETA 3D

        let currentEngraveClass = 'engrave-light';

        let isDraggingCard = false; let startX = 0, startY = 0; let currentRotateX = 0, currentRotateY = 0;

        function startDragCard(e) { isDraggingCard = true; startX = e.type.includes('touch')?e.touches[0].clientX:e.clientX; startY = e.type.includes('touch')?e.touches[0].clientY:e.clientY; card3D.style.transition = 'none'; }
        function dragCard(e) {
            if (!isDraggingCard) return;
            const clientX = e.type.includes('touch')?e.touches[0].clientX:e.clientX; const clientY = e.type.includes('touch')?e.touches[0].clientY:e.clientY;
            currentRotateY += (clientX - startX) * 0.7; currentRotateX -= (clientY - startY) * 0.7;
            if(currentRotateX > 75) currentRotateX = 75; if(currentRotateX < -75) currentRotateX = -75;
            card3D.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
            card3D.style.setProperty('--g-x', `${50 + (currentRotateY * 1.5)}%`); card3D.style.setProperty('--g-y', `${50 - (currentRotateX * 1.5)}%`);
            startX = clientX; startY = clientY;
        }
        function endDragCard() { isDraggingCard = false; card3D.style.transition = 'transform 0.1s ease-out'; }

        rotationHand.addEventListener('mousedown', startDragCard); rotationHand.addEventListener('touchstart', startDragCard, {passive: false});
        window.addEventListener('mousemove', dragCard); window.addEventListener('mouseup', endDragCard);
        window.addEventListener('touchmove', dragCard, {passive: false}); window.addEventListener('touchend', endDragCard);

        function resetRotation() { currentRotateX=0; currentRotateY=0; card3D.style.transition='transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)'; card3D.style.transform=`rotateX(0deg) rotateY(0deg)`; card3D.style.setProperty('--g-x', `50%`); card3D.style.setProperty('--g-y', `50%`); }
        function flipCard() { currentRotateX=0; currentRotateY=(Math.round(currentRotateY/180)%2===0)?180:0; card3D.style.transition='transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)'; card3D.style.transform=`rotateX(0deg) rotateY(${currentRotateY}deg)`; }

        // ==========================================
        // LECTURA EN TIEMPO REAL DESDE FIREBASE
        // ==========================================
        db.collection("designs").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            dynamicGallery.innerHTML = ''; 
            if(snapshot.empty) { 
                dynamicGallery.innerHTML = '<p class="text-gray-500 text-[10px] uppercase col-span-full text-center py-4 font-sans tracking-widest">No hay diseños en la bóveda.</p>'; 
                return; 
            }
            snapshot.forEach((doc) => {
                const design = doc.data();
                const btn = document.createElement('button');
                btn.className = 'btn-hover-fx p-3 border border-gray-700/50 hover:border-tm-gold flex flex-col items-center gap-3 bg-black/60 rounded-xl overflow-hidden transition-all focus:border-tm-gold focus:bg-black';
                btn.onclick = () => { addGraphicDesign(design.image); resetRotation(); }; 
                btn.innerHTML = `<div class="w-12 h-12 flex items-center justify-center p-1 bg-black/40 rounded-lg shadow-inner"><img src="${design.image}" class="max-w-full max-h-full filter invert opacity-90" alt="icono"></div><span class="text-[9px] uppercase text-tm-gold font-bold truncate w-full text-center tracking-widest font-sans">${design.name}</span>`;
                dynamicGallery.appendChild(btn);
            });
        });

        function setMaterial(matClass, engraveClass, materialName) {
            cardFront.className = `card-face card-front ${matClass}`; cardBack.className = `card-face card-back ${matClass} flex flex-col items-center`;
            currentEngraveClass = engraveClass; currentMaterialName = materialName;
            document.querySelectorAll('.card-graphic').forEach(img => { img.className = `card-graphic w-full h-full object-cover pointer-events-none transition-all duration-500 ${engraveClass}`; });
        }

        function addGraphicDesign(base64Source) {
            clearDesigns();
            const el = document.createElement('div'); el.className = `absolute top-0 left-0 w-full h-full pointer-events-none z-10`;
            el.innerHTML = `<img src="${base64Source}" class="card-graphic w-full h-full object-cover pointer-events-none transition-all duration-500 ${currentEngraveClass}" alt="Diseño">`;
            designInjectionZone.appendChild(el);
        }
        function clearDesigns() { designInjectionZone.innerHTML = ''; }

        // ==========================================
        // WHATSAPP: SISTEMA SEGURO Y ANTI-INYECCIÓN
        // ==========================================
        function sanitizeInput(input) {
            return input.replace(/[<>]/g, ""); 
        }

        function sendOrder() {
            const nameRaw = document.getElementById('orderName').value.trim();
            const franchiseRaw = document.getElementById('orderFranchise').value;
            const bankRaw = document.getElementById('orderBank').value.trim();

            const name = sanitizeInput(nameRaw);
            const franchise = sanitizeInput(franchiseRaw);
            const bank = sanitizeInput(bankRaw);
            
            if(!name || !franchise || !bank) {
                alert("Jefe, el cliente debe llenar todos los datos de fabricación antes de continuar.");
                return;
            }
            
            // JEFE: Enlace oficial al 3011554320
            const message = `¡Hola BS Premium Cards! Quiero ordenar mi tarjeta Exclusive Collection.%0A%0A*Detalles de Fabricación:*%0A- Material: ${currentMaterialName}%0A- Nombre a Grabar: ${name}%0A- Franquicia: ${franchise}%0A- Banco Emisor: ${bank}%0A%0AYa tengo el diseño visual listo en la página.`;
            window.open(`https://wa.me/573011554320?text=${message}`, '_blank');
        }
    </script>
</body>
