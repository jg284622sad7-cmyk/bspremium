    <script>
        let bgScene, bgCamera, bgRenderer, bgParticles;
        function initBackground3D() {
            bgScene = new THREE.Scene(); bgCamera = new THREE.Camera(); bgCamera.position.z = 1;
            bgRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            bgRenderer.setSize(window.innerWidth, window.innerHeight); bgRenderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('threejs-canvas-container').appendChild(bgRenderer.domElement);
            
            const geometry = new THREE.BufferGeometry(); const vertices = []; const vertexColors = [];
            const goldColors = [new THREE.Color(0xd4af37), new THREE.Color(0xf3e5ab), new THREE.Color(0xffd700)];
            for (let i = 0; i < (window.innerWidth * window.innerHeight)/1000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2), THREE.MathUtils.randFloatSpread(2));
                const color = goldColors[Math.floor(Math.random() * goldColors.length)]; vertexColors.push(color.r, color.g, color.b);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3)); geometry.setAttribute('color', new THREE.Float32BufferAttribute(vertexColors, 3));
            const material = new THREE.PointsMaterial({ size: 0.005, vertexColors: true, blending: THREE.AdditiveBlending, depthTest: false, transparent: true, opacity: 0.8 });
            bgParticles = new THREE.Points(geometry, material); bgScene.add(bgParticles);
            window.addEventListener('resize', () => { bgCamera.aspect = window.innerWidth/window.innerHeight; bgRenderer.setSize(window.innerWidth, window.innerHeight); }, false);
        }
        function animateBackground3D() { requestAnimationFrame(animateBackground3D); bgParticles.rotation.y += 0.0005; bgParticles.rotation.x += 0.0001; bgRenderer.render(bgScene, bgCamera); }
        initBackground3D(); animateBackground3D();
    </script>

    <script>
        // FIREBASE Config
        const firebaseConfig = { apiKey: "AIzaSyClpa9Pu1ai-aecrmFpI8FICQxybZwkfRA", authDomain: "bspremium-8d5db.firebaseapp.com", projectId: "bspremium-8d5db", storageBucket: "bspremium-8d5db.firebasestorage.app", messagingSenderId: "705566703093", appId: "1:705566703093:web:177729e3c86d90744674bc" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        const card3D = document.getElementById('card3D');

        // FÍSICAS DE ROTACIÓN
        function dragCard(e){ if(!isDrag)return; const cX=e.type.includes('touch')?e.touches[0].clientX:e.clientX, cY=e.type.includes('touch')?e.touches[0].clientY:e.clientY; rotY+=(cX-startX)*0.7; rotX-=(cY-startY)*0.7; if(rotX>75)rotX=75; if(rotX<-75)rotX=-75; card3D.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`; card3D.style.setProperty('--g-x',`${50+(rotY*1.5)}%`); card3D.style.setProperty('--g-y',`${50-(rotX*1.5)}%`); startX=cX; startY=cY; }
        document.getElementById('rotationHand').addEventListener('mousedown',(e)=>{isDrag=true; startX=e.clientX; startY=e.clientY; card3D.style.transition='none';});
        document.getElementById('rotationHand').addEventListener('touchstart',(e)=>{isDrag=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; card3D.style.transition='none';}, {passive:false});
        window.addEventListener('mousemove',dragCard); window.addEventListener('mouseup',()=>{isDrag=false;card3D.style.transition='transform 0.1s ease-out';});
        window.addEventListener('touchmove',dragCard, {passive:false}); window.addEventListener('touchend',()=>{isDrag=false;card3D.style.transition='transform 0.1s ease-out';});
        
        function resetRotation(){rotX=rotY=0;card3D.style.transition='transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';card3D.style.transform=`rotateX(0deg) rotateY(0deg)`;}
        function flipCard(){rotX=0;rotY=rotY%360===0?180:0;card3D.style.transition='transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';card3D.style.transform=`rotateX(0deg) rotateY(${rotY}deg)`;}

        // LECTURA DE DISEÑOS EN VIVO
        db.collection("designs").orderBy("timestamp", "desc").onSnapshot(s => {
            const gal = document.getElementById('dynamicGallery'); gal.innerHTML = ''; 
            if(s.empty){ gal.innerHTML = '<p class="col-span-full text-gray-500 text-[10px] uppercase text-center py-4 tracking-widest">Bóveda vacía.</p>'; return; }
            s.forEach(doc => {
                const d = doc.data(); const btn = document.createElement('button');
                btn.className = 'p-3 border border-gray-700/50 bg-black/60 rounded-xl hover:border-tm-gold flex flex-col items-center gap-2 transition-all';
                btn.onclick = () => { document.getElementById('designInjectionZone').innerHTML = `<img src="${d.image}" class="w-full h-full object-cover pointer-events-none transition-all duration-500 ${currentEngrave}">`; resetRotation(); }; 
                btn.innerHTML = `<div class="w-10 h-10 flex items-center justify-center p-1 bg-black/40 rounded"><img src="${d.image}" class="max-w-full max-h-full filter invert opacity-90"></div><span class="text-[8px] uppercase text-tm-gold font-bold truncate w-full text-center tracking-widest">${d.name}</span>`; 
                gal.appendChild(btn);
            });
        });

        function setMaterial(mat, eng, name) {
            document.getElementById('cardFront').className = `card-face card-front ${mat}`;
            document.getElementById('cardBack').className = `card-face card-back ${mat} flex flex-col items-center`;
            currentEngrave = eng; currentMat = name;
            
            document.querySelectorAll('#designInjectionZone img').forEach(i => i.className=`w-full h-full object-cover pointer-events-none transition-all duration-500 ${eng}`);
            
            document.querySelectorAll('.btn-mat').forEach(b => { b.classList.remove('border-tm-gold','text-tm-gold'); b.classList.add('border-gray-700'); });
            event.currentTarget.classList.remove('border-gray-700'); event.currentTarget.classList.add('border-tm-gold','text-tm-gold');
        }

        function clearDesigns() { document.getElementById('designInjectionZone').innerHTML = ''; }
        
        function sanitizeInput(input) { return input.replace(/[<>]/g, ""); }

        // ==========================================
        // 🧠 CEREBRO IA ESTABILIZADO SIN BACKEND V3
        // ==========================================
        function generateAI() {
            const promptInput = document.getElementById('aiPrompt');
            const prompt = promptInput.value.trim();
            const btn = document.getElementById('btnGenerateAI');
            const status = document.getElementById('aiStatus');

            if(!prompt) {
                alert("Jefe, necesito instrucciones. Escribe qué diseño quieres generar.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "SINTETIZANDO V3...";
            status.classList.remove('hidden');
            status.textContent = "FORJANDO VECTORES EN LA RED NEURONAL...";

            const laserPrompt = `High contrast pure white monochrome vector art stencil on absolute pitch black background, minimalist clean lines, highly detailed luxury logo, isolated subject: ${prompt}`;
            
            const aiImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(laserPrompt)}?width=1024&height=640&nologo=true&private=true`;

            const img = new Image();
            img.onload = () => {
                document.getElementById('designInjectionZone').innerHTML = `<img src="${aiImageUrl}" class="w-full h-full object-cover pointer-events-none transition-all duration-500 ${currentEngrave}">`;
                resetRotation();
                restaurarUI("DISEÑO COMPLETADO.");
                promptInput.value = '';
            };
            img.onerror = () => {
                restaurarUI("ERROR DE CONEXIÓN IA. REINTENTANDO PROTOCOLO...");
                setTimeout(generateAI, 1000); 
            };
            img.src = aiImageUrl;

            function restaurarUI(msg) {
                btn.disabled = false;
                btn.innerHTML = "GENERAR";
                status.textContent = msg;
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        }

        function sendOrder() {
            const n = sanitizeInput(document.getElementById('orderName').value.trim());
            const f = sanitizeInput(document.getElementById('orderFranchise').value);
            const b = sanitizeInput(document.getElementById('orderBank').value.trim());
            
            if(!n || !f || !b) return alert("Jefe, el cliente debe llenar todos los datos de fabricación antes de continuar.");
            
            // LÍNEA OFICIAL DEL JEFE
            const message = `¡Hola BS Premium Cards! Quiero ordenar mi tarjeta Exclusive Collection.%0A%0A*Detalles de Fabricación:*%0A- Material: ${currentMat}%0A- Nombre a Grabar: ${n}%0A- Franquicia: ${f}%0A- Banco Emisor: ${b}%0A%0AYa tengo el diseño visual listo en la página.`;
            window.open(`https://wa.me/573215497088?text=${message}`, '_blank');
        }
    </script>
