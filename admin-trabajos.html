<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Admin | Trabajos Realizados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tm-gold': '#D4AF37',
                        'tm-black': '#0a0a0a',
                        'tm-gray': '#111111',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tm-black text-white min-h-screen p-8 font-sans selection:bg-tm-gold selection:text-black">

    <div class="max-w-4xl mx-auto bg-tm-gray p-8 rounded-3xl border border-tm-gold/20 shadow-[0_0_50px_rgba(212,175,55,0.05)]">
        
        <div class="flex items-center justify-between mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-light tracking-widest uppercase">BS <span class="text-tm-gold font-bold">Portafolio</span></h1>
                <p class="text-gray-400 text-xs tracking-[0.2em] mt-2">Bóveda de Trabajos Reales (Fotos)</p>
            </div>
            <a href="index.html" target="_blank" class="px-6 py-3 border border-tm-gold text-tm-gold hover:bg-tm-gold hover:text-black transition-colors text-[10px] uppercase tracking-widest rounded-full">
                Ver Página Principal
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-6">
                <h2 class="text-tm-gold tracking-[0.2em] uppercase text-xs font-bold">1. Subir Foto Real</h2>
                
                <div class="space-y-3">
                    <label class="text-[10px] tracking-widest uppercase text-gray-400">Archivo de Imagen (Foto de tarjeta)</label>
                    <input type="file" id="workImage" accept="image/*" class="w-full bg-black border border-gray-800 text-white px-4 py-3 focus:outline-none focus:border-tm-gold text-xs file:mr-4 file:py-2 file:px-4 file:border-0 file:text-[10px] file:font-bold file:bg-tm-gold file:text-black hover:file:bg-white transition-all rounded">
                </div>

                <button onclick="saveWork()" class="w-full bg-tm-gold text-black font-bold py-4 rounded uppercase tracking-[0.2em] text-xs hover:bg-white transition-all duration-300 shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                    Publicar en la Página
                </button>
                <p id="statusMsg" class="text-[10px] tracking-widest uppercase hidden"></p>
            </div>

            <div>
                <h2 class="text-tm-gold tracking-[0.2em] uppercase text-xs font-bold mb-6">2. Galería Pública</h2>
                <div id="worksList" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const workImageInput = document.getElementById('workImage');
        const worksList = document.getElementById('worksList');
        const statusMsg = document.getElementById('statusMsg');

        // Intercomunicador exclusivo para el portafolio
        const syncChannel = new BroadcastChannel('bs_portfolio_sync');

        // Nueva Base de Datos solo para el Portafolio (BS_Portfolio)
        let db;
        const request = indexedDB.open("BS_Portfolio", 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("works")) {
                db.createObjectStore("works", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadWorks();
        };

        function loadWorks() {
            const transaction = db.transaction(["works"], "readonly");
            const store = transaction.objectStore("works");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                const savedWorks = getAllRequest.result;
                worksList.innerHTML = ''; 

                if(savedWorks.length === 0) {
                    worksList.innerHTML = '<p class="text-gray-500 text-[10px] tracking-widest uppercase">No hay fotos publicadas.</p>';
                    return;
                }

                // Mostrar de la más nueva a la más vieja
                savedWorks.reverse().forEach((work) => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center justify-between bg-black p-3 border border-gray-800 rounded-lg';
                    item.innerHTML = `
                        <div class="flex items-center gap-4 overflow-hidden">
                            <img src="${work.image}" class="w-16 h-10 object-cover rounded border border-gray-700" alt="foto">
                            <span class="text-[9px] text-gray-400 uppercase tracking-widest">Trabajo #${work.id}</span>
                        </div>
                        <button onclick="deleteWork(${work.id})" class="text-red-500 hover:text-red-400 text-[10px] font-bold uppercase ml-2 px-3 py-2 border border-red-900/50 bg-red-900/10 rounded transition-colors">
                            Eliminar
                        </button>
                    `;
                    worksList.appendChild(item);
                });
            };
        }

        function saveWork() {
            const file = workImageInput.files[0];

            if(!file) {
                showStatus('Selecciona una foto, Jefe.', 'text-red-500');
                return;
            }

            showStatus('Optimizando foto...', 'text-gray-400');

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Compresión para fotos (Máximo 1000px)
                    const MAX_SIZE = 1000; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Guardamos como JPEG con calidad 85% para fotos reales
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);

                    const transaction = db.transaction(["works"], "readwrite");
                    const store = transaction.objectStore("works");
                    const addRequest = store.add({ image: compressedBase64 });

                    addRequest.onsuccess = function() {
                        workImageInput.value = '';
                        showStatus('Foto publicada en vivo.', 'text-tm-gold');
                        loadWorks();
                        syncChannel.postMessage('actualizar_portfolio');
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file); 
        }

        function deleteWork(id) {
            const transaction = db.transaction(["works"], "readwrite");
            const store = transaction.objectStore("works");
            store.delete(id);
            transaction.oncomplete = function() {
                loadWorks();
                syncChannel.postMessage('actualizar_portfolio');
            };
        }

        function showStatus(msg, colorClass) {
            statusMsg.textContent = msg;
            statusMsg.className = `text-[10px] tracking-widest uppercase mt-3 block ${colorClass}`;
            setTimeout(() => { statusMsg.classList.add('hidden') }, 3000);
        }
    </script>
</body>
</html>
